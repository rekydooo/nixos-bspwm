include-file = /home/kyd0/.config/polybar/colors.ini

[bar/mybar]
width = 100%
height = 30
background = #1e1e2eCC
foreground = #cdd6f4

module-margin-left = 1
module-margin-right = 1

modules-left = bspwm
modules-center = date
modules-right = memory cpu tray

font-0 = "Hack Nerd Font:size=11"

[module/bspwm]
type = internal/bspwm

[module/date]
type = internal/date
interval = 1
date = %H:%M

[module/cpu]
type = internal/cpu
format-prefix = "CPU: "

[module/memory]
type = internal/memory
format-prefix = "RAM: "

[module/tray]
type = internal/tray

format-margin = 8px
tray-spacing = 8px
